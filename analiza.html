<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Random Trader — Analize</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
    --bg-deep:#050810; --bg-mid:#090d1a; --bg-surface:#0d1220;
    --glass-bg:rgba(13,18,32,0.65); --glass-bg2:rgba(255,255,255,0.04);
    --glass-border:rgba(255,255,255,0.08); --glass-border-lit:rgba(255,255,255,0.14);
    --accent:#00e5a0; --accent-dim:rgba(0,229,160,0.12); --accent-glow:rgba(0,229,160,0.35);
    --blue:#3d8bff; --blue-dim:rgba(61,139,255,0.12); --blue-glow:rgba(61,139,255,0.3);
    --orange:#ff8c42; --orange-dim:rgba(255,140,66,0.12);
    --purple:#a855f7; --purple-dim:rgba(168,85,247,0.12); --purple-glow:rgba(168,85,247,0.3);
    --red:#ff4d6a; --red-dim:rgba(255,77,106,0.12);
    --gold:#fbbf24;
    --text-primary:#f0f4ff; --text-secondary:#8892a4; --text-muted:#4a5568;
    --radius-sm:8px; --radius-md:14px; --radius-lg:20px;
    --font-display:'Syne',sans-serif; --font-body:'DM Sans',sans-serif; --font-mono:'DM Mono',monospace;
    --transition:0.22s cubic-bezier(0.4,0,0.2,1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg-deep);color:var(--text-primary);font-family:var(--font-body);font-size:14px;line-height:1.6;min-height:100vh;overflow-x:hidden;}
button{font-family:var(--font-body);cursor:pointer;border:none;background:none;}
a{color:inherit;text-decoration:none;}

/* COSMIC */
.cosmic{position:fixed;inset:0;z-index:0;pointer-events:none;}
.cosmic::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 15% 10%,rgba(61,139,255,0.08) 0%,transparent 60%),radial-gradient(ellipse 60% 50% at 85% 20%,rgba(0,229,160,0.06) 0%,transparent 55%),radial-gradient(ellipse 70% 80% at 50% 100%,rgba(168,85,247,0.05) 0%,transparent 60%);}
.cosmic::after{content:'';position:absolute;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");opacity:.4;}

/* NAV */
.nav{position:sticky;top:0;z-index:100;backdrop-filter:blur(20px) saturate(1.4);background:rgba(5,8,16,0.82);border-bottom:1px solid var(--glass-border);padding:0 24px;height:60px;display:flex;align-items:center;justify-content:space-between;gap:16px;}
.nav-brand{display:flex;align-items:center;gap:10px;}
.nav-logo{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,var(--purple),var(--blue));display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:800;font-size:0.72em;color:#fff;letter-spacing:-0.5px;box-shadow:0 0 14px rgba(168,85,247,0.4);}
.nav-title{font-family:var(--font-display);font-weight:700;font-size:1em;}
.nav-sub{font-size:0.7em;color:var(--text-muted);}
.nav-right{display:flex;gap:8px;}
.nbtn{padding:6px 14px;border-radius:var(--radius-sm);font-size:0.78em;font-weight:600;border:1px solid var(--glass-border);color:var(--text-secondary);transition:all var(--transition);}
.nbtn:hover{border-color:var(--glass-border-lit);color:var(--text-primary);background:var(--glass-bg2);}
.nbtn.purple{border-color:rgba(168,85,247,0.3);color:var(--purple);background:var(--purple-dim);}
.nbtn.purple:hover{background:rgba(168,85,247,0.2);}

/* PAGE */
.page{position:relative;z-index:1;max-width:1360px;margin:0 auto;padding:28px 24px 60px;}

/* HEADER */
.hdr{margin-bottom:24px;}
.hdr h1{font-family:var(--font-display);font-weight:800;font-size:1.9em;letter-spacing:-0.5px;}
.hdr h1 em{font-style:normal;background:linear-gradient(90deg,var(--purple),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.hdr-sub{color:var(--text-muted);font-size:0.83em;margin-top:4px;}

/* FILTERS */
.fbar{display:flex;align-items:flex-end;gap:10px;flex-wrap:wrap;padding:16px 20px;background:var(--glass-bg);border:1px solid var(--glass-border);border-radius:var(--radius-md);backdrop-filter:blur(16px);margin-bottom:20px;}
.fg{display:flex;flex-direction:column;gap:4px;min-width:110px;}
.fl{font-size:0.6em;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);}
.fi{padding:6px 10px;background:rgba(255,255,255,0.04);border:1px solid var(--glass-border);border-radius:var(--radius-sm);color:var(--text-primary);font-size:0.82em;font-family:var(--font-body);transition:all var(--transition);}
.fi:focus{outline:none;border-color:rgba(168,85,247,0.4);background:rgba(168,85,247,0.05);}
.fi option{background:#0d1220;}
.fa{display:flex;gap:8px;margin-left:auto;}
.btn-p{padding:7px 16px;background:var(--purple-dim);border:1px solid rgba(168,85,247,0.3);border-radius:var(--radius-sm);color:var(--purple);font-size:0.8em;font-weight:600;transition:all var(--transition);}
.btn-p:hover{background:rgba(168,85,247,0.2);}
.btn-g{padding:7px 14px;background:transparent;border:1px solid var(--glass-border);border-radius:var(--radius-sm);color:var(--text-muted);font-size:0.8em;font-weight:500;transition:all var(--transition);}
.btn-g:hover{border-color:var(--glass-border-lit);color:var(--text-secondary);}

/* STATS */
.sbar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:22px;}
.spill{flex:1;min-width:100px;padding:12px 16px;background:var(--glass-bg);border:1px solid var(--glass-border);border-radius:var(--radius-md);backdrop-filter:blur(16px);transition:all var(--transition);}
.spill:hover{border-color:var(--glass-border-lit);}
.spill-l{font-size:0.6em;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);margin-bottom:4px;}
.spill-v{font-family:var(--font-mono);font-size:1.08em;font-weight:500;}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:14px;}

/* CARD */
.acard{position:relative;background:var(--glass-bg);border:1px solid var(--glass-border);border-radius:var(--radius-lg);overflow:hidden;cursor:pointer;transition:all var(--transition);backdrop-filter:blur(20px) saturate(1.4);}
.acard::before{content:'';position:absolute;top:0;left:10%;right:10%;height:1px;background:linear-gradient(90deg,transparent,rgba(168,85,247,0.7),transparent);opacity:0;transition:opacity var(--transition);}
.acard:hover{transform:translateY(-4px);box-shadow:0 16px 48px rgba(168,85,247,0.1),0 0 0 1px rgba(168,85,247,0.15);border-color:rgba(168,85,247,0.2);}
.acard:hover::before{opacity:1;}
.acard-h{padding:15px 16px 11px;display:flex;align-items:flex-start;justify-content:space-between;gap:10px;}
.acard-pair{font-family:var(--font-display);font-weight:700;font-size:1.02em;}
.acard-date{font-size:0.7em;color:var(--text-muted);margin-top:2px;font-family:var(--font-mono);}
.acard-bx{display:flex;flex-direction:column;align-items:flex-end;gap:4px;}
.bp{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:14px;font-size:0.66em;font-weight:700;}
.bp.bullish{background:rgba(0,229,160,0.1);color:var(--accent);border:1px solid rgba(0,229,160,0.2);}
.bp.bearish{background:var(--red-dim);color:var(--red);border:1px solid rgba(255,77,106,0.2);}
.bp.neutral{background:rgba(255,255,255,0.04);color:var(--text-muted);border:1px solid var(--glass-border);}
.acard-div{height:1px;background:var(--glass-border);margin:0 16px;}
.acard-b{padding:11px 16px 14px;}
.acard-tfs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:9px;}
.tfc{font-size:0.6em;font-weight:600;padding:2px 7px;border-radius:10px;text-transform:uppercase;letter-spacing:0.5px;}
.tfc.w{background:rgba(255,140,66,0.1);color:var(--orange);border:1px solid rgba(255,140,66,0.15);}
.tfc.d{background:rgba(0,229,160,0.08);color:var(--accent);border:1px solid rgba(0,229,160,0.12);}
.tfc.h4{background:var(--blue-dim);color:var(--blue);border:1px solid rgba(61,139,255,0.15);}
.tfc.h1{background:var(--purple-dim);color:var(--purple);border:1px solid rgba(168,85,247,0.15);}
.acard-prev{font-size:0.79em;color:var(--text-secondary);line-height:1.55;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.acard-ft{padding:9px 16px 13px;display:flex;align-items:center;justify-content:space-between;}
.acard-num{font-size:0.68em;color:var(--text-muted);font-family:var(--font-mono);}
.acard-open{font-size:0.68em;font-weight:600;color:var(--purple);opacity:0;transition:opacity var(--transition);}
.acard:hover .acard-open{opacity:1;}

/* EMPTY */
.empty{text-align:center;padding:60px 24px;color:var(--text-muted);}
.empty-icon{font-size:2.8em;margin-bottom:10px;opacity:0.35;}
.empty-title{font-family:var(--font-display);font-size:1.05em;margin-bottom:5px;color:var(--text-secondary);}

/* MODAL */
.moverlay{position:fixed;inset:0;z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px;background:rgba(5,8,16,0.88);backdrop-filter:blur(14px);opacity:0;pointer-events:none;transition:opacity 0.24s;}
.moverlay.open{opacity:1;pointer-events:all;}
.mbox{background:rgba(10,14,26,0.96);border:1px solid rgba(168,85,247,0.2);border-radius:24px;width:100%;max-width:860px;max-height:92vh;overflow-y:auto;backdrop-filter:blur(32px);transform:scale(0.95) translateY(14px);transition:transform 0.28s cubic-bezier(0.34,1.56,0.64,1);}
.moverlay.open .mbox{transform:scale(1) translateY(0);}
.mhdr{display:flex;align-items:center;justify-content:space-between;padding:20px 24px 16px;border-bottom:1px solid var(--glass-border);position:sticky;top:0;background:rgba(10,14,26,0.97);backdrop-filter:blur(20px);z-index:2;border-radius:24px 24px 0 0;}
.mpair{font-family:var(--font-display);font-weight:700;font-size:1.18em;color:var(--purple);}
.mdate{font-size:0.76em;color:var(--text-muted);margin-top:2px;}
.mclose{width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,0.05);border:1px solid var(--glass-border);color:var(--text-muted);display:flex;align-items:center;justify-content:center;transition:all var(--transition);}
.mclose:hover{background:rgba(255,77,106,0.15);border-color:rgba(255,77,106,0.3);color:var(--red);}
.mbody{padding:22px 24px;}
.meta-row{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:18px;}
.mchip{background:rgba(255,255,255,0.03);border:1px solid var(--glass-border);border-radius:var(--radius-sm);padding:8px 14px;flex:1;min-width:100px;}
.mchip-l{font-size:0.61em;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);margin-bottom:3px;}
.mchip-v{font-size:0.86em;font-weight:600;color:var(--text-secondary);}
.mbadge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:14px;font-size:0.82em;font-weight:700;}
.mbadge.bullish{background:rgba(0,229,160,0.1);color:var(--accent);border:1px solid rgba(0,229,160,0.2);}
.mbadge.bearish{background:var(--red-dim);color:var(--red);border:1px solid rgba(255,77,106,0.2);}
.mbadge.neutral{background:rgba(255,255,255,0.04);color:var(--text-muted);border:1px solid var(--glass-border);}
.tfsec{margin-bottom:11px;border-radius:var(--radius-sm);overflow:hidden;}
.tfhdr{display:flex;align-items:center;gap:7px;padding:8px 14px;font-size:0.68em;font-weight:700;letter-spacing:0.8px;text-transform:uppercase;}
.tfhdr.tw{background:rgba(255,140,66,0.1);color:var(--orange);border:1px solid rgba(255,140,66,0.2);}
.tfhdr.td{background:rgba(0,229,160,0.08);color:var(--accent);border:1px solid rgba(0,229,160,0.15);}
.tfhdr.t4{background:var(--blue-dim);color:var(--blue);border:1px solid rgba(61,139,255,0.2);}
.tfhdr.t1{background:var(--purple-dim);color:var(--purple);border:1px solid rgba(168,85,247,0.2);}
.tfcnt{background:rgba(0,0,0,0.3);border:1px solid var(--glass-border);border-top:none;padding:12px 14px;font-size:0.83em;color:var(--text-secondary);line-height:1.75;white-space:pre-wrap;word-break:break-word;}
.cw{margin-top:10px;}
.ci{width:100%;border-radius:var(--radius-sm);cursor:zoom-in;transition:opacity var(--transition);}
.ci:hover{opacity:0.88;}
.cl{display:inline-flex;align-items:center;gap:5px;margin-top:7px;padding:5px 12px;background:rgba(255,255,255,0.04);border:1px solid var(--glass-border);border-radius:16px;font-size:0.73em;color:var(--text-muted);transition:all var(--transition);}
.cl:hover{color:var(--text-secondary);border-color:var(--glass-border-lit);}

/* linked trades */
.lsec{margin-top:22px;padding-top:20px;border-top:1px solid var(--glass-border);}
.lhdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:13px;}
.ltitle{display:flex;align-items:center;gap:8px;font-family:var(--font-display);font-weight:700;font-size:0.86em;color:var(--text-secondary);}
.lrel{display:flex;align-items:center;gap:5px;padding:5px 11px;background:var(--glass-bg);border:1px solid var(--glass-border);border-radius:16px;color:var(--text-muted);font-size:0.7em;font-weight:600;transition:all var(--transition);}
.lrel:hover{border-color:var(--purple);color:var(--purple);}
.ltrow{display:grid;grid-template-columns:50px 1fr 60px 80px 40px;align-items:center;gap:12px;padding:10px 14px;border-radius:var(--radius-sm);margin-bottom:6px;background:var(--glass-bg);border:1px solid var(--glass-border);font-size:0.81em;transition:background var(--transition);}
.ltrow:hover{background:rgba(255,255,255,0.035);}

/* lightbox */
.lbox{position:fixed;inset:0;z-index:2000;background:rgba(0,0,0,0.94);backdrop-filter:blur(20px);display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity 0.2s;}
.lbox.open{opacity:1;pointer-events:all;}
.lbox img{max-width:100%;max-height:90vh;border-radius:var(--radius-md);}
.lbox-x{position:absolute;top:18px;right:18px;width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.15);color:#fff;font-size:1em;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all var(--transition);}
.lbox-x:hover{background:rgba(255,77,106,0.3);}

/* spin */
.spin{display:inline-block;width:16px;height:16px;border:2px solid rgba(168,85,247,0.2);border-top-color:var(--purple);border-radius:50%;animation:rot 0.8s linear infinite;vertical-align:middle;margin-right:7px;}
@keyframes rot{to{transform:rotate(360deg);}}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}

::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:10px;}

@media(max-width:768px){
    .page{padding:14px;}
    .grid{grid-template-columns:1fr;}
    .sbar{gap:8px;}
    .fbar{gap:8px;}
    .fg{min-width:calc(50% - 4px);}
}
</style>
</head>
<body>
<div class="cosmic"></div>

<nav class="nav">
    <div class="nav-brand">
        <div class="nav-logo">ART</div>
        <div>
            <div class="nav-title">A Random Trader</div>
            <div class="nav-sub">Jurnal de Analize</div>
        </div>
    </div>
    <div class="nav-right">
        <button class="nbtn" onclick="window.open('prop-firm-1.html','_blank')">📓 Jurnal</button>
        <button class="nbtn purple" onclick="loadAnalyses()">↺ Reîncarcă</button>
    </div>
</nav>

<div class="page">
    <div class="hdr">
        <h1>Jurnal de <em>Analize</em></h1>
        <div class="hdr-sub" id="pageSubtitle">Se încarcă…</div>
    </div>

    <!-- FILTERS -->
    <div class="fbar">
        <div class="fg"><div class="fl">Pereche</div><select class="fi" id="fPair" onchange="applyFilters()"><option value="">Toate</option></select></div>
        <div class="fg"><div class="fl">Bias</div>
            <select class="fi" id="fBias" onchange="applyFilters()">
                <option value="">Toate</option>
                <option value="Bullish">🟢 Bullish</option>
                <option value="Bearish">🔴 Bearish</option>
                <option value="Neutral">⚪ Neutral</option>
            </select>
        </div>
        <div class="fg"><div class="fl">Zi</div>
            <select class="fi" id="fDay" onchange="applyFilters()">
                <option value="">Toate</option>
                <option>Monday</option><option>Tuesday</option><option>Wednesday</option><option>Thursday</option><option>Friday</option>
            </select>
        </div>
        <div class="fg"><div class="fl">Lună</div>
            <select class="fi" id="fMonth" onchange="applyFilters()">
                <option value="">Toate</option>
                <option>January</option><option>February</option><option>March</option><option>April</option>
                <option>May</option><option>June</option><option>July</option><option>August</option>
                <option>September</option><option>October</option><option>November</option><option>December</option>
            </select>
        </div>
        <div class="fg"><div class="fl">Status</div><select class="fi" id="fStatus" onchange="applyFilters()"><option value="">Toate</option></select></div>
        <div class="fa">
            <button class="btn-g" onclick="resetFilters()">✕ Reset</button>
            <button class="btn-p" onclick="applyFilters()">🔍 Filtrează</button>
        </div>
    </div>

    <!-- STATS -->
    <div class="sbar">
        <div class="spill"><div class="spill-l">Total</div><div class="spill-v" id="sTotal" style="color:var(--text-primary);">—</div></div>
        <div class="spill"><div class="spill-l">Bullish</div><div class="spill-v" id="sBullish" style="color:var(--accent);">—</div></div>
        <div class="spill"><div class="spill-l">Bearish</div><div class="spill-v" id="sBearish" style="color:var(--red);">—</div></div>
        <div class="spill"><div class="spill-l">Perechi</div><div class="spill-v" id="sPairs" style="color:var(--blue);">—</div></div>
        <div class="spill"><div class="spill-l">Ultima</div><div class="spill-v" id="sLatest" style="color:var(--gold);font-size:0.84em;">—</div></div>
    </div>

    <!-- GRID -->
    <div id="grid"><div class="empty"><div class="spin"></div><span style="color:var(--text-muted);">Se încarcă analizele…</span></div></div>
</div>

<!-- MODAL -->
<div class="moverlay" id="modal">
    <div class="mbox">
        <div class="mhdr">
            <div><div class="mpair" id="mPair">—</div><div class="mdate" id="mDate"></div></div>
            <button class="mclose" onclick="closeModal()">✕</button>
        </div>
        <div class="mbody" id="mBody"></div>
    </div>
</div>

<!-- LIGHTBOX -->
<div class="lbox" id="lbox" onclick="closeLB()">
    <button class="lbox-x" onclick="closeLB()">✕</button>
    <img id="lbImg" src="" alt="Chart">
</div>

<script>
const ANALIZA_URL = 'https://script.google.com/macros/s/AKfycby545E0z1U_T4y7Obgp7jbkhjEM-nTQ14zccKu3_WhAWI93028iGy3JHPHk9XJvU1_5/exec';
const JOURNAL_URL = 'https://script.google.com/macros/s/AKfycbzbrBuxQ-fFd19EuR4msAwA4H7AyYVBw2I2_XDyvd1UjuV3GnK6E81kdRirBoTsqSWNRA/exec';
const ACCOUNTS_SHEET = 'Accounts';

let allA = [], filtered = [], accs = [];

// ── LOAD ──
async function loadAnalyses() {
    document.getElementById('grid').innerHTML = '<div class="empty"><div class="spin"></div><span style="color:var(--text-muted);">Se încarcă analizele…</span></div>';
    try {
        const r = await fetch(ANALIZA_URL, { signal: AbortSignal.timeout(15000) });
        const j = await r.json();
        allA = (Array.isArray(j) ? j : (j.data || []));
        allA.sort((a,b) => new Date(b.date||0) - new Date(a.date||0));
        buildFilterOpts();
        filtered = [...allA];
        renderGrid();
        renderStats(filtered);
        document.getElementById('pageSubtitle').textContent = allA.length + ' analize încărcate';
    } catch(e) {
        document.getElementById('grid').innerHTML = '<div class="empty"><div class="empty-icon">⚠️</div><div class="empty-title">Eroare la încărcare</div><div style="font-size:0.82em;">Verifică conexiunea sau dezactivează ad-blocker-ul.</div></div>';
    }
}

async function loadAccounts() {
    try {
        const r = await fetch(`${JOURNAL_URL}?action=get&sheet=${ACCOUNTS_SHEET}`, { signal: AbortSignal.timeout(10000) });
        const j = await r.json();
        accs = (j.data||[]).map(row => {
            let m={};try{m=JSON.parse(row.partialCloses||'{}');}catch(e){}
            return {id:String(row.luna||''), name:String(row.data||''), sheet:String(row.wl||'')};
        }).filter(a=>a.id && a.sheet);
    } catch(e) {}
}

// ── FILTERS ──
function buildFilterOpts() {
    const pairs = [...new Set(allA.map(a=>a.pair).filter(Boolean))].sort();
    const stats = [...new Set(allA.map(a=>a.tradeStatus).filter(Boolean))].sort();
    document.getElementById('fPair').innerHTML   = '<option value="">Toate</option>' + pairs.map(p=>`<option>${p}</option>`).join('');
    document.getElementById('fStatus').innerHTML = '<option value="">Toate</option>' + stats.map(s=>`<option>${s}</option>`).join('');
}

function applyFilters() {
    const pair  = document.getElementById('fPair').value.toLowerCase();
    const bias  = document.getElementById('fBias').value.toLowerCase();
    const day   = document.getElementById('fDay').value.toLowerCase();
    const month = document.getElementById('fMonth').value.toLowerCase();
    const stat  = document.getElementById('fStatus').value.toLowerCase();
    filtered = allA.filter(a =>
        (!pair  || (a.pair||'').toLowerCase().includes(pair)) &&
        (!bias  || (a.marketBias||'').toLowerCase() === bias) &&
        (!day   || (a.day||'').toLowerCase() === day) &&
        (!month || (a.month||'').toLowerCase() === month) &&
        (!stat  || (a.tradeStatus||'').toLowerCase() === stat)
    );
    renderGrid(); renderStats(filtered);
}

function resetFilters() {
    ['fPair','fBias','fDay','fMonth','fStatus'].forEach(id=>document.getElementById(id).value='');
    filtered = [...allA]; renderGrid(); renderStats(filtered);
}

// ── GRID ──
function renderGrid() {
    const el = document.getElementById('grid');
    if (!filtered.length) {
        el.innerHTML = '<div class="empty"><div class="empty-icon">🔍</div><div class="empty-title">Nicio analiză găsită</div><div style="font-size:0.82em;">Încearcă să resetezi filtrele.</div></div>';
        return;
    }
    el.innerHTML = '<div class="grid">' + filtered.map((a,i) => {
        const bc = a.marketBias==='Bullish'?'bullish':a.marketBias==='Bearish'?'bearish':'neutral';
        const bi = a.marketBias==='Bullish'?'🟢':a.marketBias==='Bearish'?'🔴':'⚪';
        const ds = a.date ? new Date(a.date).toLocaleDateString('ro-RO',{day:'2-digit',month:'short',year:'numeric'}) : '—';
        const tfs = (a.weeklyAnalysis?'<span class="tfc w">W1</span>':'') + (a.dailyAnalysis?'<span class="tfc d">D1</span>':'') + (a.fourHAnalysis?'<span class="tfc h4">4H</span>':'') + (a.oneHAnalysis?'<span class="tfc h1">1H</span>':'');
        const prev = a.dailyAnalysis||a.weeklyAnalysis||a.fourHAnalysis||a.oneHAnalysis||'';
        const hasImg = a.weeklyPhoto||a.dailyPhoto||a.fourHPhoto||a.oneHPhoto;
        return `<div class="acard" onclick="openA(${i})" style="animation:fadeUp 0.3s ${i*0.025}s both;">
            <div class="acard-h">
                <div><div class="acard-pair">${a.pair||'—'}</div><div class="acard-date">📅 ${ds} · ${a.day||'—'}</div></div>
                <div class="acard-bx"><div class="bp ${bc}">${bi} ${a.marketBias||'—'}</div>${a.tradeStatus?`<div style="font-size:0.6em;color:var(--text-muted);font-family:var(--font-mono);">${a.tradeStatus}</div>`:''}</div>
            </div>
            <div class="acard-div"></div>
            <div class="acard-b">
                <div class="acard-tfs">${tfs}</div>
                ${prev?`<div class="acard-prev">${prev}</div>`:'<div style="color:var(--text-muted);font-size:0.76em;font-style:italic;">Fără notițe…</div>'}
            </div>
            <div class="acard-ft">
                <span class="acard-num">#${a.rowNumber||i+1}${hasImg?' · 📸':''}</span>
                <span class="acard-open">Deschide ↗</span>
            </div>
        </div>`;
    }).join('') + '</div>';
}

// ── STATS ──
function renderStats(list) {
    document.getElementById('sTotal').textContent   = list.length;
    document.getElementById('sBullish').textContent = list.filter(a=>a.marketBias==='Bullish').length;
    document.getElementById('sBearish').textContent = list.filter(a=>a.marketBias==='Bearish').length;
    document.getElementById('sPairs').textContent   = new Set(list.map(a=>a.pair).filter(Boolean)).size;
    const l = list[0];
    document.getElementById('sLatest').textContent  = l?.date ? new Date(l.date).toLocaleDateString('ro-RO',{day:'2-digit',month:'short'}) : '—';
}

// ── OPEN MODAL ──
function openA(idx) {
    const a = filtered[idx]; if (!a) return;
    document.getElementById('mPair').textContent = a.pair||'—';
    const ds = a.date ? new Date(a.date).toLocaleDateString('ro-RO',{weekday:'long',day:'2-digit',month:'long',year:'numeric'}) : '—';
    document.getElementById('mDate').textContent = ds;

    const bc = a.marketBias==='Bullish'?'bullish':a.marketBias==='Bearish'?'bearish':'neutral';
    const bi = a.marketBias==='Bullish'?'🟢':a.marketBias==='Bearish'?'🔴':'⚪';

    const TFS = [
        {tk:'weeklyAnalysis',pk:'weeklyPhoto',lbl:'Weekly (W1)',cls:'tw',ic:'📅'},
        {tk:'dailyAnalysis', pk:'dailyPhoto', lbl:'Daily (D1)', cls:'td',ic:'📆'},
        {tk:'fourHAnalysis', pk:'fourHPhoto', lbl:'4H',         cls:'t4',ic:'🕓'},
        {tk:'oneHAnalysis',  pk:'oneHPhoto',  lbl:'1H',         cls:'t1',ic:'🕐'},
    ];

    const tfsHtml = TFS.map(tf => {
        const txt = (a[tf.tk]||'').trim(), ph = (a[tf.pk]||'').trim();
        if (!txt && !ph) return '';
        const emb = /^https?:\/\//i.test(ph) && !/drive\.google\.com\/file/i.test(ph);
        const imgH = ph ? (emb
            ? `<div class="cw"><img class="ci" src="${ph}" alt="Chart" loading="lazy" onclick="openLB('${ph}')" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><a href="${ph}" target="_blank" class="cl" style="display:none;">📸 Open Chart ↗</a></div><a href="${ph}" target="_blank" class="cl">↗ Open in new tab</a>`
            : `<a href="${ph}" target="_blank" class="cl">📸 View Chart ↗</a>`) : '';
        return `<div class="tfsec"><div class="tfhdr ${tf.cls}">${tf.ic} ${tf.lbl}</div><div class="tfcnt">${txt||'<em style="color:var(--text-muted);">Fără notițe.</em>'}${imgH}</div></div>`;
    }).join('');

    document.getElementById('mBody').innerHTML = `
        <div class="meta-row">
            <div class="mchip"><div class="mchip-l">Bias</div><div class="mchip-v"><span class="mbadge ${bc}">${bi} ${a.marketBias||'—'}</span></div></div>
            <div class="mchip"><div class="mchip-l">Status</div><div class="mchip-v">${a.tradeStatus||'—'}</div></div>
            <div class="mchip"><div class="mchip-l">Zi</div><div class="mchip-v">${a.day||'—'}</div></div>
            ${a.session?`<div class="mchip"><div class="mchip-l">Sesiune</div><div class="mchip-v">${a.session}</div></div>`:''}
        </div>
        ${tfsHtml}
        <div style="text-align:center;margin-top:14px;">
            <a href="prop-firm-1.html" target="_blank" style="display:inline-flex;align-items:center;gap:6px;padding:8px 20px;background:var(--purple-dim);border:1px solid rgba(168,85,247,0.25);color:var(--purple);border-radius:16px;font-weight:600;font-size:0.83em;transition:all var(--transition);" onmouseover="this.style.background='rgba(168,85,247,0.2)'" onmouseout="this.style.background='var(--purple-dim)'">📓 Deschide Jurnal</a>
        </div>
        <div class="lsec">
            <div class="lhdr">
                <div class="ltitle">🔗 Tranzacții Legate în Jurnal</div>
                <button class="lrel" onclick="loadLinked(${a.rowNumber})">↺ Reîncarcă</button>
            </div>
            <div id="ltBody"><div style="text-align:center;padding:14px;"><span class="spin"></span><span style="color:var(--text-muted);font-size:0.81em;">Se caută tranzacții…</span></div></div>
        </div>`;

    document.getElementById('modal').classList.add('open');
    document.body.style.overflow = 'hidden';
    loadLinked(a.rowNumber);
}

function closeModal() { document.getElementById('modal').classList.remove('open'); document.body.style.overflow=''; }

// ── LINKED TRADES ──
async function loadLinked(rowNumber) {
    const el = document.getElementById('ltBody'); if (!el) return;
    const rn = String(rowNumber);
    if (!accs.length) await loadAccounts();
    el.innerHTML = `<div style="text-align:center;padding:14px;"><span class="spin"></span><span style="color:var(--text-muted);font-size:0.81em;">Se caută în ${accs.length} cont${accs.length===1?'':'uri'}…</span></div>`;

    const matched = [];
    await Promise.all(accs.map(async acc => {
        try {
            const r = await fetch(`${JOURNAL_URL}?action=get&sheet=${acc.sheet}`, { signal: AbortSignal.timeout(10000) });
            const j = await r.json();
            (j.data||[]).filter(t => t.luna && String(t.linkedAnalysisId) === rn)
                .forEach(t => matched.push({...t, _acc: acc.name}));
        } catch(e) {}
    }));

    if (!matched.length) {
        el.innerHTML = '<div style="text-align:center;padding:18px;color:var(--text-muted);font-size:0.81em;">Nicio tranzacție găsită în jurnal pentru această analiză.<br><small style="margin-top:4px;display:block;">Poți lega o tranzacție din formularul de adăugare.</small></div>';
        return;
    }
    matched.sort((a,b) => new Date(b.data||0) - new Date(a.data||0));

    el.innerHTML = matched.map(t => {
        const wC = t.wl==='Win'?'var(--accent)':t.wl==='Loss'?'var(--red)':t.wl==='Open'?'var(--blue)':'var(--text-muted)';
        const pC = t.position==='Long'?'var(--blue)':'var(--red)';
        const pv = parseFloat(t.profit)||0;
        const vC = pv>0?'var(--accent)':pv<0?'var(--red)':'var(--text-muted)';
        const ds = t.data?new Date(t.data).toLocaleDateString('ro-RO',{day:'2-digit',month:'short',year:'numeric'}):'—';
        return `<div class="ltrow">
            <div style="font-weight:700;color:${pC};">${t.position||'—'}</div>
            <div><div style="font-weight:600;color:var(--text-secondary);">${t.pereche||'—'} <span style="font-size:0.83em;color:var(--text-muted);">· ${t._acc}</span></div><div style="font-size:0.8em;color:var(--text-muted);">📅 ${ds}</div></div>
            <div style="font-weight:700;color:${wC};">${t.wl||'—'}</div>
            <div style="font-family:var(--font-mono);font-weight:500;color:${vC};text-align:right;">${pv>=0?'+':''}$${pv.toFixed(2)}</div>
            <div style="font-size:0.73em;color:var(--text-muted);font-family:var(--font-mono);">${t.r?t.r+'R':'—'}</div>
        </div>`;
    }).join('') + `<div style="text-align:right;padding:5px 14px 0;font-size:0.73em;color:var(--text-muted);">${matched.length} tranzacți${matched.length===1?'e':'i'}</div>`;
}

// ── LIGHTBOX ──
function openLB(src) { document.getElementById('lbImg').src=src; document.getElementById('lbox').classList.add('open'); }
function closeLB()   { document.getElementById('lbox').classList.remove('open'); }

document.getElementById('modal').addEventListener('click', e => { if(e.target===e.currentTarget) closeModal(); });
document.addEventListener('keydown', e => { if(e.key==='Escape'){ closeModal(); closeLB(); } });

// ── INIT ──
loadAccounts();
loadAnalyses();
</script>
